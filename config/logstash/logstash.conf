# config/logstash/logstash.conf
input {
  beats {
    port => 5044
  }
  
  tcp {
    port => 5000
    codec => json
    type => "app-logs"
  }
}

filter {
  if [type] == "app-logs" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:service} %{GREEDYDATA:message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
    
    if [level] in [ "error", "fatal" ] {
      mutate {
        add_tag => [ "alert" ]
      }
    }
    
    mutate {
      remove_field => [ "@version", "host" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "intelliwave-logs-%{+YYYY.MM.dd}"
    manage_template => false
  }
  
  if "alert" in [tags] {
    slack {
      url => "${SLACK_WEBHOOK_URL}"
      format => "Error Alert: %{message}"
    }
  }
}