# config/kubernetes/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: intelliwave-secrets
  namespace: intelliwave-itis
type: Opaque
data:
  database-url: <base64-encoded>
  jwt-secret: <base64-encoded>
  redis-password: <base64-encoded>
  encryption-key: <base64-encoded>
  stripe-secret: <base64-encoded>
  smtp-pass: <base64-encoded>
